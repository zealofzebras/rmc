# Based on https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/

name: Release

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    - name: Install poetry
      run: python -m pip install poetry
    - name: Install dependencies
      run: poetry install --no-interaction
    - name: Run test suite
      run: |
        poetry run rmc --help
        poetry run rmc --version
        poetry run python -c "import rmc.cli"

  build:
    name: Build distribution
    needs:
    - tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: python3 -m pip install build --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  build-binaries:
    name: Build binaries (${{ matrix.target }})
    needs:
    - tests
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Add more targets by appending new entries here.
        include:
          - target: win-x64
            runner: windows-latest
            os: win
            arch: x64
          - target: win-arm64
            runner: windows-11-arm
            os: win
            arch: arm64
          - target: linux-x64
            runner: ubuntu-latest
            os: linux
            arch: x64
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
    - name: Install poetry
      run: python -m pip install poetry
    - name: Install dependencies
      run: poetry install --no-interaction
    - name: Install PyInstaller
      run: poetry run python -m pip install pyinstaller
    - name: Build executable
      run: poetry run pyinstaller cli.spec --clean --noconfirm
    - name: Prepare release asset
      shell: pwsh
      run: |
        $binaryName = if ("${{ matrix.os }}" -eq "win") { "cli.exe" } else { "cli" }
        $assetExt = if ("${{ matrix.os }}" -eq "win") { ".exe" } else { "" }
        New-Item -ItemType Directory -Path "release-assets" -Force | Out-Null
        Copy-Item "dist/$binaryName" "release-assets/rmc-${{ matrix.os }}-${{ matrix.arch }}$assetExt"
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: rmc-binary-${{ matrix.target }}
        path: release-assets/*

  publish-to-pypi:
    name: Publish Python distribution to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rmc
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Sign Python distribution and upload to Github Release
    needs:
    - publish-to-pypi
    - build-binaries
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Download all binary artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets
        pattern: rmc-binary-*
        merge-multiple: true
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.0.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release if needed
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release view '${{ github.ref_name }}' --repo '${{ github.repository }}'
        || gh release create '${{ github.ref_name }}' --repo '${{ github.repository }}' --notes ""
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      # Upload to GitHub Release using the `gh` CLI.
      # `dist/` contains the built packages, and the
      # sigstore-produced signatures and certificates.
      run: >-
        gh release upload
        '${{ github.ref_name }}' dist/** release-assets/*
        --repo '${{ github.repository }}'
        --clobber

  publish-to-testpypi:
    name: Publish Python distribution to TestPyPI
    needs:
    - build
    - tests
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/rmc

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        # Don't fail when this is another push to the same version. If we put
        # the git hash in the version string, this could be removed.
        skip-existing: true
